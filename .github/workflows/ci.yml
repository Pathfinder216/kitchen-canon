name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Detect whether anything other than docs (**.md) changed. We gate the heavy
  # jobs on this INSTEAD of a workflow-level `paths-ignore`, because a workflow
  # that never triggers leaves its required status checks stuck in "Expected"
  # forever and blocks the PR. A job skipped via `if:` reports as a successful
  # required check, so docs-only PRs stay cheap AND remain mergeable.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              # picomatch globstar: '**/*.md' matches .md at any depth.
              # NOT '**.md' — picomatch degrades that to '*.md' (root only),
              # so docs under plans/ slip through and force a full CI run.
              - '!**/*.md'

  backend:
    name: Backend tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SESSION_SECRET: ci-only-dummy-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  frontend:
    name: Frontend tests + build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    name: Docker image build
    needs: changes
    if: github.ref == 'refs/heads/master' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
