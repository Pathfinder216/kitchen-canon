# Host-level nginx reverse-proxy vhost for Kitchen Canon.
#
# Context: the Pi already runs host nginx terminating HTTPS for another site,
# so we do NOT bind a second :443 from Docker. The app container listens on 127.0.0.1:8080
# (see docker-compose.yml) and this vhost fronts it on its own DuckDNS hostname.
#
# Install (on the Pi):
#   1. sudo cp deploy/nginx/kitchencanon.conf /etc/nginx/sites-available/kitchencanon
#   2. sudo ln -s /etc/nginx/sites-available/kitchencanon /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d kitchencanon.duckdns.org
#      (certbot rewrites this file: adds the listen 443 + ssl_* lines and an http->https redirect)

server {
    listen 80;
    listen [::]:80;
    server_name kitchencanon.duckdns.org;

    # Recipe media and uploads can be large; match the app's 20 MB limit.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # app trusts this to issue Secure cookies
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
